<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Grandmaster Chess AI · Pro</title>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Inter:wght@400;600;800&family=Outfit:wght@500;700&display=swap');

        * { margin: 0; padding: 0; box-sizing: border-box; }
        
        :root {
            --bg-gradient: linear-gradient(135deg, #0f172a 0%, #1e1b4b 100%);
            --glass-bg: rgba(30, 41, 59, 0.7);
            --glass-border: rgba(255, 255, 255, 0.1);
            --accent-primary: #3b82f6;
            --accent-secondary: #c084fc;
            --text-main: #f8fafc;
            --text-muted: #94a3b8;
            
            /* Traditional Wood Board Colors */
            --board-light: #f0d9b5;
            --board-dark: #b58863;
            --square-highlight: rgba(251, 191, 36, 0.5);
            --last-move-highlight: rgba(52, 211, 153, 0.4);
            --eval-bar-bg: #1e293b;
            --eval-bar-fill: #10b981;
        }

        body { 
            font-family: 'Inter', sans-serif; 
            background: var(--bg-gradient); 
            min-height: 100vh; 
            display: flex; 
            flex-direction: column; 
            align-items: center; 
            justify-content: center;
            padding: 20px;
            color: var(--text-main);
            overflow-x: hidden;
        }

        h1 { 
            font-family: 'Outfit', sans-serif;
            margin-bottom: 30px; 
            font-size: 3rem;
            font-weight: 800;
            text-shadow: 0 10px 20px rgba(0,0,0,0.3); 
            background: linear-gradient(to right, #60a5fa, #c084fc);
            -webkit-background-clip: text;
            background-clip: text;
            -webkit-text-fill-color: transparent;
            letter-spacing: -1px;
        }

        .container {
            display: flex;
            gap: 40px;
            align-items: flex-start;
            flex-wrap: wrap;
            justify-content: center;
            width: 100%;
            max-width: 1200px;
        }

        /* --- Game Panel --- */
        .game-panel { 
            background: var(--glass-bg); 
            backdrop-filter: blur(20px);
            border: 1px solid var(--glass-border);
            padding: 40px; 
            border-radius: 24px; 
            box-shadow: 0 40px 80px rgba(0,0,0,0.6);
            display: flex;
            flex-direction: column;
            align-items: center;
            position: relative;
        }

        #status-container {
            width: 100%;
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 25px;
        }

        #status { 
            font-size: 1.25rem;
            font-weight: 600;
            color: var(--text-main);
        }

        .badge {
            background: var(--accent-primary);
            color: white;
            padding: 6px 12px;
            border-radius: 8px;
            font-size: 0.85rem;
            font-weight: 700;
            text-transform: uppercase;
            letter-spacing: 0.5px;
            box-shadow: 0 4px 12px rgba(59, 130, 246, 0.3);
        }

        .player-info {
            width: 100%;
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin: 12px 0;
            padding: 15px 25px;
            background: rgba(15, 23, 42, 0.4);
            border-radius: 14px;
            font-weight: 600;
            color: var(--text-muted);
            border: 1px solid rgba(255,255,255,0.05);
        }

        .clock {
            font-family: 'Outfit', monospace;
            font-size: 1.8rem;
            background: #020617;
            padding: 8px 18px;
            border-radius: 10px;
            color: var(--text-main);
            border: 2px solid transparent;
            transition: all 0.3s cubic-bezier(0.4, 0, 0.2, 1);
            min-width: 130px;
            text-align: center;
        }

        .clock.active {
            background: #1e293b;
            color: #fbbf24;
            border-color: #fbbf24;
            box-shadow: 0 0 20px rgba(251, 191, 36, 0.3);
            transform: scale(1.05);
        }

        /* --- Chess Board --- */
        #board { 
            display: grid; 
            grid-template-columns: repeat(8, min(11vw, 75px)); 
            grid-template-rows: repeat(8, min(11vw, 75px)); 
            border: 8px solid #0f172a; 
            border-radius: 8px;
            overflow: hidden;
            box-shadow: 0 20px 50px rgba(0,0,0,0.6);
            background: #0f172a;
            position: relative;
        }

        .eval-bar-container {
            width: 100%;
            height: 12px;
            background: var(--eval-bar-bg);
            border-radius: 6px;
            margin-bottom: 20px;
            overflow: hidden;
            position: relative;
            border: 1px solid rgba(255,255,255,0.05);
        }

        .eval-bar-fill {
            height: 100%;
            background: var(--eval-bar-fill);
            width: 50%;
            transition: width 0.5s cubic-bezier(0.4, 0, 0.2, 1);
        }

        .eval-text {
            position: absolute;
            right: 10px;
            top: -20px;
            font-size: 0.75rem;
            color: var(--text-muted);
            font-family: 'Outfit', sans-serif;
            font-weight: 700;
        }

        .square { 
            width: 100%; 
            height: 100%; 
            display: flex; 
            align-items: center; 
            justify-content: center; 
            cursor: pointer; 
            transition: background 0.2s ease;
            user-select: none;
            position: relative;
        }

        .square.light { background: var(--board-light); }
        .square.dark { background: var(--board-dark); }
        
        .square.selected { background: #fbbf24 !important; }
        .square.last-move { background: var(--last-move-highlight) !important; }
        
        .square.valid-move::after {
            content: '';
            position: absolute;
            width: 25%;
            height: 25%;
            background: rgba(0, 0, 0, 0.15);
            border-radius: 50%;
        }
        
        .square.valid-capture::after {
            content: '';
            position: absolute;
            width: 85%;
            height: 85%;
            border: 4px solid rgba(0, 0, 0, 0.1);
            border-radius: 50%;
        }

        /* SVG Pieces Styling */
        .piece {
            width: 85%;
            height: 85%;
            background-size: contain;
            background-repeat: no-repeat;
            background-position: center;
            filter: drop-shadow(0 4px 6px rgba(0,0,0,0.3));
            transition: transform 0.2s cubic-bezier(0.175, 0.885, 0.32, 1.275);
        }
        
        .piece:hover { transform: scale(1.1); }

        /* Fixed Mapping: Use distinct classes for color and type to avoid conflicts like .b.b */
        .piece.white.pawn   { background-image: url('https://upload.wikimedia.org/wikipedia/commons/4/45/Chess_plt45.svg'); }
        .piece.white.knight { background-image: url('https://upload.wikimedia.org/wikipedia/commons/7/70/Chess_nlt45.svg'); }
        .piece.white.bishop { background-image: url('https://upload.wikimedia.org/wikipedia/commons/b/b1/Chess_blt45.svg'); }
        .piece.white.rook   { background-image: url('https://upload.wikimedia.org/wikipedia/commons/7/72/Chess_rlt45.svg'); }
        .piece.white.queen  { background-image: url('https://upload.wikimedia.org/wikipedia/commons/1/15/Chess_qlt45.svg'); }
        .piece.white.king   { background-image: url('https://upload.wikimedia.org/wikipedia/commons/4/42/Chess_klt45.svg'); }

        .piece.black.pawn   { background-image: url('https://upload.wikimedia.org/wikipedia/commons/c/c7/Chess_pdt45.svg'); }
        .piece.black.knight { background-image: url('https://upload.wikimedia.org/wikipedia/commons/e/ef/Chess_ndt45.svg'); }
        .piece.black.bishop { background-image: url('https://upload.wikimedia.org/wikipedia/commons/9/98/Chess_bdt45.svg'); }
        .piece.black.rook   { background-image: url('https://upload.wikimedia.org/wikipedia/commons/f/ff/Chess_rdt45.svg'); }
        .piece.black.queen  { background-image: url('https://upload.wikimedia.org/wikipedia/commons/4/47/Chess_qdt45.svg'); }
        .piece.black.king   { background-image: url('https://upload.wikimedia.org/wikipedia/commons/f/f0/Chess_kdt45.svg'); }

        /* --- Info Panel --- */
        .info-panel {
            background: var(--glass-bg); 
            backdrop-filter: blur(20px);
            border: 1px solid var(--glass-border);
            padding: 30px; 
            border-radius: 24px; 
            width: 350px;
            box-shadow: 0 40px 80px rgba(0,0,0,0.6);
            max-height: 85vh;
            display: flex;
            flex-direction: column;
        }

        .info-panel h3 { margin-bottom: 18px; color: var(--text-muted); text-transform: uppercase; font-size: 0.85rem; letter-spacing: 1.5px; font-weight: 700; }
        
        .history {
            flex-grow: 1;
            height: 250px;
            overflow-y: auto;
            display: grid;
            grid-template-columns: 30px 1fr 1fr;
            grid-auto-rows: min-content;
            gap: 10px;
            margin-top: 10px;
            font-family: 'Outfit', monospace;
            font-size: 1.1rem;
            padding-right: 10px;
        }
        .history .move-num { color: #475569; font-size: 0.9rem; padding-top: 4px; }
        .history span.move { padding: 6px 12px; border-radius: 8px; background: rgba(255,255,255,0.05); cursor: default; }
        .history span.white-move { color: #f8fafc; font-weight: 600; }
        .history span.black-move { color: #94a3b8; }
        
        .history::-webkit-scrollbar { width: 5px; }
        .history::-webkit-scrollbar-thumb { background: #334155; border-radius: 10px; }

        .model-selector {
            margin-top: 30px;
            border-top: 1px solid rgba(255,255,255,0.1);
            padding-top: 25px;
        }

        .engine-toggle {
            display: flex;
            background: rgba(15,23,42,0.6);
            border-radius: 12px;
            padding: 5px;
            margin-bottom: 18px;
            gap: 5px;
        }
        .engine-toggle button {
            flex: 1; padding: 10px 5px; border: none; border-radius: 8px; cursor: pointer;
            font-size: 0.85rem; font-weight: 600; font-family: 'Inter', sans-serif;
            background: transparent; color: #64748b; transition: all 0.2s;
        }
        .engine-toggle button.active {
            background: var(--accent-primary); color: #fff;
            box-shadow: 0 4px 12px rgba(59,130,246,0.4);
        }

        .llm-config { display: none; flex-direction: column; gap: 12px; }
        .llm-config.visible { display: flex; }
        .llm-config label { font-size: 0.8rem; color: var(--text-muted); margin-bottom: 4px; display: block; font-weight: 600; }
        .llm-config select, .llm-config input {
            background: rgba(15,23,42,0.8);
            border: 1px solid rgba(255,255,255,0.15);
            color: var(--text-main);
            border-radius: 8px;
            padding: 10px 14px;
            font-size: 0.95rem;
            font-family: 'Inter', sans-serif;
            width: 100%;
            outline: none;
            transition: all 0.2s;
        }
        .llm-config select:focus, .llm-config input:focus { border-color: var(--accent-primary); box-shadow: 0 0 0 3px rgba(59, 130, 246, 0.2); }

        .llm-status {
            font-size: 0.85rem; padding: 10px 15px; border-radius: 10px;
            background: rgba(15,23,42,0.4); color: var(--text-muted);
            display: flex; align-items: center; gap: 10px; margin-top: 5px;
        }
        .llm-status .dot { width: 8px; height: 8px; border-radius: 50%; background: #475569; }
        .llm-status.ready .dot { background: #10b981; box-shadow: 0 0 8px #10b981; }
        .llm-status.ready { color: #10b981; font-weight: 600; }
        .llm-status.error .dot { background: #ef4444; box-shadow: 0 0 8px #ef4444; }
        .llm-status.error { color: #ef4444; font-weight: 600; }

        button.reset {
            background: #ef4444; color: white; border: none; padding: 14px 20px; border-radius: 14px; cursor: pointer; 
            font-weight: 800; font-family: 'Outfit', sans-serif; text-transform: uppercase; letter-spacing: 1px;
            margin-top: 30px; width: 100%; transition: all 0.2s;
            box-shadow: 0 10px 20px rgba(239, 68, 68, 0.3);
        }
        button.reset:hover { background: #dc2626; transform: translateY(-2px); box-shadow: 0 15px 30px rgba(239, 68, 68, 0.4); }
        button.reset:active { transform: translateY(0); }

        .ai-thinking { color: #fbbf24; animation: pulse 1.5s infinite; font-weight: 700; letter-spacing: 0.5px; }
        @keyframes pulse { 0% { opacity: 0.6; transform: scale(1); } 50% { opacity: 1; transform: scale(1.02); } 100% { opacity: 0.6; transform: scale(1); } }

    </style>
</head>
<body>
    <h1>♜ Grandmaster Chess AI</h1>
    
    <div class="container">
        <div class="game-panel">
            <div id="status-container">
                <div id="status">Loading Engine v0.3.0…</div>
                <div class="badge" id="engine-type">Native WASM Core</div>
            </div>
            
            <div class="player-info">
               <span>🤖 Advanced AI (Black)</span>
               <div class="clock" id="timer-b">10:00.0</div>
            </div>

            <div class="eval-bar-container">
                <div id="eval-text" class="eval-text">0.0</div>
                <div id="eval-bar" class="eval-bar-fill"></div>
            </div>

            <div id="board"></div>

            <div class="player-info">
               <span>👤 Player (White)</span>
               <div class="clock active" id="timer-w">10:00.0</div>
            </div>
            
            <button class="reset" onclick="resetGame()">New Match</button>
        </div>
        
        <div class="info-panel">
            <h3>Match History</h3>
            <div class="history" id="history"></div>

            <div class="model-selector">
                <h3>AI Backend</h3>
                <div class="engine-toggle">
                    <button id="btn-local" class="active" onclick="setEngine('local')">⚙️ WASM Core</button>
                    <button id="btn-llm" onclick="setEngine('llm')">🌐 Frontier Model</button>
                </div>
                
                <div class="llm-config" id="llm-config">
                    <div>
                        <label for="model-select">Select Model</label>
                        <select id="model-select" onchange="onModelChange()">
                            <optgroup label="Google">
                                <option value="gemini-1.5-pro">Gemini 1.5 Pro</option>
                                <option value="gemini-1.5-flash">Gemini 1.5 Flash</option>
                            </optgroup>
                            <optgroup label="Anthropic">
                                <option value="claude-3-opus-20240229">Claude 3 Opus</option>
                                <option value="claude-3-5-sonnet-20240620">Claude 3.5 Sonnet</option>
                            </optgroup>
                            <optgroup label="OpenAI">
                                <option value="gpt-4o">GPT-4o</option>
                                <option value="gpt-4-turbo">GPT-4 Turbo</option>
                            </optgroup>
                            <optgroup label="Local (OpenAI-compatible)">
                                <option value="local-openai">Local LLM</option>
                            </optgroup>
                        </select>
                    </div>
                    
                    <div id="base-url-row" style="display:none">
                        <label for="base-url-input">Base URL</label>
                        <input type="text" id="base-url-input" placeholder="http://localhost:8080/api" value="http://open-webui:8080/api" oninput="onBaseUrlChange()" />
                    </div>
                    
                    <div id="local-model-row" style="display:none">
                        <label for="local-model-input">Model Name</label>
                        <input type="text" id="local-model-input" placeholder="llama3" oninput="onLocalModelChange()" />
                    </div>
                    
                    <div>
                        <label for="api-key-input">API Key</label>
                        <input type="password" id="api-key-input" placeholder="Enter API Key…" oninput="onApiKeyChange()" />
                    </div>
                    
                    <div class="llm-status" id="llm-status">
                        <span class="dot"></span>
                        <span id="llm-status-text">Ready to Connect</span>
                    </div>
                </div>
            </div>
        </div>
    </div>

    <script type="module">
        // ── WASM Engine Initialization ────────────────────────────────────────
        let engine = null;
        let currentBoardData = null;
        
        // ── Game State ────────────────────────────────────────────────────────
        let selectedSquare = null;
        let validMoves = [];
        let aiThinking = false;
        let lastMove = null;
        
        // ── Settings ──────────────────────────────────────────────────────────
        let engineMode = 'local';
        let llmModel = 'gemini-1.5-pro';
        let llmApiKey = '';
        let llmBaseUrl = 'http://open-webui:8080/api';
        let llmLocalModelName = '';
        const SEARCH_DEPTH = 4;

        const boardEl   = document.getElementById('board');
        const statusEl  = document.getElementById('status');
        const historyEl = document.getElementById('history');

        // ── Pieces Mapping (JS Side) ──────────────────────────────────────────
        const typeMap = {
            'p': 'pawn',
            'n': 'knight',
            'b': 'bishop',
            'r': 'rook',
            'q': 'queen',
            'k': 'king'
        };
        const colorMap = {
            'w': 'white',
            'b': 'black'
        };

        // ── Clocks ────────────────────────────────────────────────────────────
        let timeW = 600000;
        let timeB = 600000;
        let lastTime = Date.now();
        let timerInterval = null;

        function formatTime(ms) {
            if (ms < 0) ms = 0;
            const mins = Math.floor(ms / 60000);
            const secs = Math.floor((ms % 60000) / 1000);
            const decis = Math.floor((ms % 1000) / 100);
            return `${mins}:${secs.toString().padStart(2, '0')}.${decis}`;
        }

        function updateTimers() {
            if (!engine || engine.game_over()) return;
            const now = Date.now();
            const delta = now - lastTime;
            lastTime = now;

            if (engine.move_count() > 0 || aiThinking) {
                if (engine.get_turn() === 'w') {
                    timeW -= delta;
                    if (timeW < 0) timeW = 0;
                } else {
                    timeB -= delta;
                    if (timeB < 0) timeB = 0;
                }
            }

            document.getElementById('timer-w').textContent = formatTime(timeW);
            document.getElementById('timer-b').textContent = formatTime(timeB);

            if (timeW <= 0) {
                statusEl.textContent = 'Time out! Black wins.';
                clearInterval(timerInterval);
                syncClocks();
            } else if (timeB <= 0) {
                statusEl.textContent = 'Time out! White wins.';
                clearInterval(timerInterval);
                syncClocks();
            }
        }

        function syncClocks() {
            if (!engine) return;
            document.getElementById('timer-w').classList.toggle('active', 
                engine.get_turn() === 'w' && !engine.game_over() && timeW > 0);
            document.getElementById('timer-b').classList.toggle('active', 
                engine.get_turn() === 'b' && !engine.game_over() && timeB > 0);
        }

        // ── UI Rendering ──────────────────────────────────────────────────────
        function getSquareStr(row, col) {
            return String.fromCharCode(97 + col) + (8 - row);
        }

        function updateBoard() {
            if (!engine) return;
            currentBoardData = JSON.parse(engine.get_board());
            boardEl.innerHTML = '';

            for (let row = 0; row < 8; row++) {
                for (let col = 0; col < 8; col++) {
                    const squareStr = getSquareStr(row, col);
                    const piece = currentBoardData[row][col];

                    const div = document.createElement('div');
                    div.className = `square ${(row + col) % 2 === 0 ? 'light' : 'dark'}`;
                    div.dataset.sq = squareStr;

                    if (piece) {
                        const pieceDiv = document.createElement('div');
                        // Use mapped descriptive classes to avoid CSS selector collisions (e.g. .b.b)
                        const cClass = colorMap[piece.color];
                        const tClass = typeMap[piece.type];
                        pieceDiv.className = `piece ${cClass} ${tClass}`;
                        div.appendChild(pieceDiv);
                    }

                    if (selectedSquare === squareStr) div.classList.add('selected');
                    if (lastMove && (lastMove.from === squareStr || lastMove.to === squareStr))
                        div.classList.add('last-move');

                    const moveMatch = validMoves.find(m => m.to === squareStr);
                    if (moveMatch) {
                        if (piece || moveMatch.flags.includes('e')) {
                            div.classList.add('valid-capture');
                        } else {
                            div.classList.add('valid-move');
                        }
                    }

                    div.onclick = () => onSquareClick(squareStr);
                    boardEl.appendChild(div);
                }
            }

            updateEvalBar();
        }

        function updateEvalBar() {
            if (!engine) return;
            const evalScore = engine.get_evaluation();
            const evalText = document.getElementById('eval-text');
            const evalBar = document.getElementById('eval-bar');
            
            // Normalize: 0 is center (50%), +500 is 100%, -500 is 0%
            // A 5-pawn advantage should saturate the bar.
            const percent = Math.max(0, Math.min(100, 50 + (evalScore / 10)));
            evalBar.style.width = `${percent}%`;
            
            const scoreFormatted = (evalScore / 100).toFixed(1);
            evalText.textContent = (evalScore > 0 ? '+' : '') + scoreFormatted;
        }

        function onSquareClick(square) {
            if (!engine || aiThinking || engine.game_over()) return;

            if (selectedSquare) {
                const moveMatch = validMoves.find(m => m.to === square);
                if (moveMatch) {
                    const promo = moveMatch.flags.includes('p') ? 'q' : '';
                    const resStr = engine.make_move(selectedSquare, square, promo);
                    if (resStr) {
                        const res = JSON.parse(resStr);
                        selectedSquare = null;
                        validMoves = [];
                        lastMove = { from: res.from, to: res.to };
                        renderHistory(res, true);
                        updateBoard();
                        checkGameOver();
                        syncClocks();
                        if (!engine.game_over()) triggerAI();
                        return;
                    }
                }
            }

            const row = 8 - parseInt(square[1]);
            const col = square.charCodeAt(0) - 97;
            const piece = currentBoardData[row][col];
            
            if (piece && piece.color === engine.get_turn()) {
                selectedSquare = square;
                validMoves = JSON.parse(engine.legal_moves_for(square));
            } else {
                selectedSquare = null;
                validMoves = [];
            }
            updateBoard();
        }

        // ── AI Integration ────────────────────────────────────────────────────
        function triggerAI() {
            aiThinking = true;
            const label = engineMode === 'llm' ? getModelLabel() : 'WASM Core';
            statusEl.innerHTML = `<span class="ai-thinking">${label} is analyzing…</span>`;

            if (engineMode === 'llm' && llmApiKey) {
                triggerLLMAI();
            } else {
                setTimeout(() => {
                    const san = engine.best_move(SEARCH_DEPTH);
                    aiThinking = false;
                    if (san) {
                        applyAIMove(san);
                    } else {
                        statusEl.textContent = 'AI Calculation Error';
                    }
                }, 50);
            }
        }

        function applyAIMove(san) {
            const resStr = engine.make_san_move(san);
            if (resStr) {
                const res = JSON.parse(resStr);
                lastMove = { from: res.from, to: res.to };
                renderHistory(res, false);
                updateBoard();
                checkGameOver();
                syncClocks();
            }
        }

        async function triggerLLMAI() {
            const prompt = `You are a chess grandmaster. Provide only the single best legal move for Black in the following position.
FEN: ${engine.get_fen()}
Legal Moves: ${JSON.parse(engine.legal_moves_san()).join(', ')}
Respond with ONLY the move string (e.g., e5, Nf6, O-O). No explanation.`;

            let bestMove = null;
            try {
                if (llmModel.startsWith('gemini')) bestMove = await callGemini(prompt);
                else if (llmModel.startsWith('claude')) bestMove = await callClaude(prompt);
                else bestMove = await callOpenAI(prompt, llmBaseUrl, llmLocalModelName);
            } catch (e) {
                console.error(e);
                fallbackToWasm('API Error');
                return;
            }

            const legalMoves = JSON.parse(engine.legal_moves_san());
            const cleanBest = bestMove ? bestMove.replace(/[+#!?]/g, '').trim() : '';
            const matched = legalMoves.find(m => m.replace(/[+#]/g, '') === cleanBest);
            
            if (matched) {
                aiThinking = false;
                applyAIMove(matched);
            } else {
                fallbackToWasm(`Invalid LLM move: ${bestMove}`);
            }
        }

        function fallbackToWasm(reason) {
            console.warn(reason);
            document.getElementById('llm-status').className = 'llm-status error';
            document.getElementById('llm-status-text').textContent = 'Falling back to WASM Core';
            setTimeout(() => {
                const san = engine.best_move(SEARCH_DEPTH);
                aiThinking = false;
                applyAIMove(san);
            }, 10);
        }

        // ── API Handlers ──────────────────────────────────────────────────────
        async function callGemini(prompt) {
            const url = `https://generativelanguage.googleapis.com/v1beta/models/${llmModel}:generateContent?key=${llmApiKey}`;
            const res = await fetch(url, {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify({ contents: [{ parts: [{ text: prompt }] }] })
            });
            const data = await res.json();
            return data.candidates?.[0]?.content?.parts?.[0]?.text?.trim();
        }

        async function callClaude(prompt) {
            const res = await fetch('https://api.anthropic.com/v1/messages', {
                method: 'POST',
                headers: { 'Content-Type': 'application/json', 'x-api-key': llmApiKey, 'anthropic-version': '2023-06-01', 'anthropic-dangerous-direct-browser-access': 'true' },
                body: JSON.stringify({ model: llmModel, max_tokens: 10, messages: [{ role: 'user', content: prompt }] })
            });
            const data = await res.json();
            return data.content?.[0]?.text?.trim();
        }

        async function callOpenAI(prompt, baseUrl = 'https://api.openai.com', modelName = null) {
            const url = `${baseUrl.replace(/\/$/, '').replace(/\/v1$/, '')}/v1/chat/completions`;
            const res = await fetch(url, {
                method: 'POST',
                headers: { 'Content-Type': 'application/json', 'Authorization': `Bearer ${llmApiKey}` },
                body: JSON.stringify({ model: modelName || llmModel, messages: [{ role: 'user', content: prompt }], max_tokens: 10 })
            });
            const data = await res.json();
            return data.choices?.[0]?.message?.content?.trim();
        }

        // ── Game Lifecycle ────────────────────────────────────────────────────
        function checkGameOver() {
            if (engine.game_over()) {
                clearInterval(timerInterval);
                if (engine.in_checkmate()) statusEl.textContent = `Checkmate! ${engine.get_turn() === 'w' ? 'Black' : 'White'} wins.`;
                else statusEl.textContent = 'Match Drawn.';
            } else if (engine.in_check()) {
                statusEl.innerHTML = `<span style="color:#ef4444">Check!</span> ${engine.get_turn() === 'w' ? 'Player' : 'AI'}'s turn`;
            } else {
                statusEl.textContent = `${engine.get_turn() === 'w' ? 'Player' : 'AI'}'s turn`;
            }
        }

        function renderHistory(res, isWhite) {
            const moveNum = Math.ceil(engine.move_count() / 2);
            if (isWhite) {
                const numSpan = document.createElement('span');
                numSpan.className = 'move-num';
                numSpan.textContent = `${moveNum}.`;
                historyEl.appendChild(numSpan);
            }
            const span = document.createElement('span');
            span.className = `move ${isWhite ? 'white-move' : 'black-move'}`;
            span.textContent = res.san;
            historyEl.appendChild(span);
            historyEl.scrollTop = historyEl.scrollHeight;
        }

        function resetGame() {
            if (!engine) return;
            engine.reset();
            selectedSquare = null;
            validMoves = [];
            lastMove = null;
            aiThinking = false;
            historyEl.innerHTML = '';
            timeW = 600000;
            timeB = 600000;
            lastTime = Date.now();
            updateBoard();
            statusEl.textContent = 'White to move';
            clearInterval(timerInterval);
            timerInterval = setInterval(updateTimers, 100);
            syncClocks();
        }

        // ── Global Handlers ───────────────────────────────────────────────────
        window.setEngine = (mode) => {
            engineMode = mode;
            document.getElementById('btn-local').classList.toggle('active', mode === 'local');
            document.getElementById('btn-llm').classList.toggle('active', mode === 'llm');
            document.getElementById('llm-config').classList.toggle('visible', mode === 'llm');
            document.getElementById('engine-type').textContent = mode === 'local' ? 'Native WASM Core' : `🌐 ${getModelLabel()}`;
        };

        function getModelLabel() {
            if (llmModel === 'local-openai') return llmLocalModelName || 'Local LLM';
            return document.getElementById('model-select').selectedOptions[0]?.text || llmModel;
        }

        window.onModelChange = () => {
            llmModel = document.getElementById('model-select').value;
            const isLocal = llmModel === 'local-openai';
            document.getElementById('base-url-row').style.display = isLocal ? 'block' : 'none';
            document.getElementById('local-model-row').style.display = isLocal ? 'block' : 'none';
            window.onApiKeyChange();
        };

        window.onApiKeyChange = () => {
            llmApiKey = document.getElementById('api-key-input').value.trim();
            const statusBox = document.getElementById('llm-status');
            const statusText = document.getElementById('llm-status-text');
            if (llmApiKey) {
                statusBox.className = 'llm-status ready';
                statusText.textContent = `Ready: ${getModelLabel()}`;
            } else {
                statusBox.className = 'llm-status';
                statusText.textContent = 'API Key Required';
            }
        };

        window.onBaseUrlChange = () => llmBaseUrl = document.getElementById('base-url-input').value.trim();
        window.onLocalModelChange = () => {
            llmLocalModelName = document.getElementById('local-model-input').value.trim();
            window.onApiKeyChange();
        };

        window.resetGame = resetGame;

        // ── Bootstrap ─────────────────────────────────────────────────────────
        (async () => {
            try {
                const mod = await import('./pkg/chess_engine.js');
                await mod.default();
                engine = new mod.ChessEngine();
                resetGame();
            } catch (e) {
                console.error(e);
                statusEl.textContent = 'WASM Initialization Failed';
            }
        })();
    </script>
</body>
</html>
